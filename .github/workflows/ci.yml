# Nyon Engine Testing Configuration

# GitHub Actions CI Pipeline
name: Nyon Engine Build

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
        build_type: [Debug, Release]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libglfw3-dev \
          libglm-dev \
          xorg-dev \
          libglu1-mesa-dev \
          freeglut3-dev \
          mesa-common-dev
      
    - name: Cache Build
      uses: actions/cache@v3
      with:
        path: build
        key: ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DENABLE_TESTING=OFF
    
    - name: Build Engine
      run: |
        cd build
        make -j$(nproc) nyon_engine
    
    - name: Build Demo Games
      run: |
        cd build
        make -j$(nproc)

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Dependencies
      run: |
        brew install cmake glfw glm
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DENABLE_TESTING=OFF
    
    - name: Build Engine
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu) nyon_engine
    
    - name: Build Demo Games
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)

  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libglfw3-dev \
          libglm-dev \
          cppcheck \
          clang-tools
    
    - name: Static Analysis with Cppcheck
      run: |
        cppcheck --enable=all --inconclusive --xml --xml-version=2 engine/ 2> cppcheck_results.xml
    
    - name: Upload Cppcheck Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: cppcheck-results
        path: cppcheck_results.xml

  documentation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Doxygen
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz
    
    - name: Generate Documentation
      run: |
        mkdir -p build
        cd build
        cmake .. -DBUILD_DOCUMENTATION=ON
        make doc
    
    - name: Upload Documentation
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: build/docs/